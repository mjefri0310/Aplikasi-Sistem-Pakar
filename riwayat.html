<div class="sidebar">

<h2><i class="fas fa-heartbeat"></i> E-Health</h2>

</ul>

<!-- Main -->

<div class="main">

<div class="header">

<h1>

<i class="fas fa-history"></i>

Riwayat Diagnosa

</h1>

</div>

<table>

<thead>

<tr>

<th>No</th>

<th>Nama Pasien</th>

<th>Penyakit</th>

<th>Tanggal</th>

</tr>

</thead>

<tbody id="isiRiwayat">

</tbody>

</table>

<br>

<button onclick="window.print()">

<i class="fas fa-print"></i>

Cetak

</button>

<button onclick="hapusRiwayat()">

<i class="fas fa-trash"></i>

Hapus Riwayat

</button>

<footer>

Copyright © 2026 |
Sistem Pakar Kesehatan |
Backward Chaining |
Muhammad Jefri

</footer>

</div>

<script>

let data = JSON.parse(localStorage.getItem("diagnosa")) || [];

let isi = "";

if(data.length==0){

isi = `
<tr>

<td colspan="4" style="text-align:center">

Belum ada riwayat diagnosa.

</td>

</tr>
`;

}

else{

data.forEach((d,index)=>{

isi += `

<tr>

<td>${index+1}</td>

<td>${d.nama}</td>

<td>${d.penyakit}</td>

<td>${d.tanggal}</td>

</tr>

`;

});

}

document.getElementById("isiRiwayat").innerHTML = isi;

function hapusRiwayat(){

if(confirm("Apakah Anda yakin ingin menghapus semua riwayat diagnosa?")){

localStorage.removeItem("diagnosa");

location.reload();

}

}

</script>

</body>

</html>
